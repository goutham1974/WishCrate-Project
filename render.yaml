services:
  - type: web
    name: wishcrate-backend
    runtime: java
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/wishcrate-backend-1.0.0.jar
    envVars:
      - key: PORT
        value: 8080
      - key: DB_URL
        fromDatabase:
          name: postgres
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: postgres
          property: username
      - key: DB_PASSWORD
        fromDatabase:
          name: postgres
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_API_KEY
        fromService:
          type: env
          name: STRIPE_API_KEY
      - key: MAIL_USERNAME
        fromService:
          type: env
          name: MAIL_USERNAME
      - key: MAIL_PASSWORD
        fromService:
          type: env
          name: MAIL_PASSWORD
    memoryOverrides:
      - memoryMB: 512

  - type: web
    name: wishcrate-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npm run preview
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://wishcrate-backend.onrender.com/api

  - type: pserv
    name: wishcrate-postgres
    plan: free
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: wishcrate
      - key: POSTGRES_USER
        value: postgres
